# @package _global_

to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

select_channels:
  _target_: emg2qwerty.transforms.SelectChannels
  channels: [0, 2, 4, 6, 8, 10, 12, 14]

band_rotation:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120

amplitude_scale:
  _target_: emg2qwerty.transforms.RandomAmplitudeScale
  min_scale: 0.9
  max_scale: 1.1

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25
  n_freq_masks: 2
  freq_mask_param: 4

transforms:
  train:
    - ${to_tensor}
    - ${select_channels}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${amplitude_scale}
    - ${logspec}
    - ${specaug}

  val:
    - ${to_tensor}
    - ${select_channels}
    - ${logspec}

  test: ${transforms.val}